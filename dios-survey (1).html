<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>D10S↑ — Tell us your Napoli</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Cormorant+Garamond:ital,wght@0,300;0,400;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
:root{--nero:#080806;--giallo:#F2C12E;--bianco:#F5F0E8;--testo:rgba(245,240,232,0.65)}
html{scroll-behavior:smooth}
body{background:var(--nero);color:var(--bianco);font-family:'DM Sans',sans-serif;min-height:100vh;overflow-x:hidden}
.bg{position:fixed;inset:0;pointer-events:none;z-index:0;overflow:hidden;opacity:.05}
.bg svg{width:100%;height:100%}
.lang-bar{position:fixed;top:0;left:0;right:0;z-index:100;display:flex;justify-content:flex-end;padding:.8rem 1.5rem;background:linear-gradient(180deg,var(--nero) 60%,transparent)}
.lb{background:none;border:1px solid rgba(245,240,232,.15);color:var(--testo);font-family:'DM Sans',sans-serif;font-size:.65rem;letter-spacing:.2em;padding:.3rem .6rem;cursor:pointer;transition:all .2s;margin-left:.3rem}
.lb.active{border-color:var(--giallo);color:var(--giallo)}
.hero{position:relative;min-height:100vh;display:flex;flex-direction:column;justify-content:center;align-items:center;text-align:center;padding:5rem 1.5rem 3rem;z-index:1}
.h-ey{font-size:.65rem;letter-spacing:.5em;text-transform:uppercase;color:var(--giallo);margin-bottom:1.5rem;opacity:0;animation:fu 1s ease .3s forwards}
.h-logo{font-family:'Bebas Neue',sans-serif;font-size:clamp(5rem,25vw,9rem);line-height:.85;color:var(--bianco);letter-spacing:.05em;opacity:0;animation:fu 1s ease .5s forwards}
.h-logo span{color:var(--giallo);display:inline-block;animation:fl 2s ease-in-out infinite}
.h-sub{font-family:'Cormorant Garamond',serif;font-style:italic;font-size:clamp(1rem,4vw,1.3rem);color:var(--testo);margin-top:.5rem;opacity:0;animation:fu 1s ease .7s forwards}
.h-div{width:50px;height:1px;background:var(--giallo);margin:2rem auto;opacity:0;animation:fu 1s ease .9s forwards}
.h-ttl{font-family:'Cormorant Garamond',serif;font-size:clamp(1.4rem,6vw,2rem);line-height:1.3;max-width:500px;color:var(--bianco);opacity:0;animation:fu 1s ease 1.1s forwards}
.h-ttl em{color:var(--giallo);font-style:italic}
.h-nap{font-family:'Cormorant Garamond',serif;font-style:italic;font-size:1rem;color:var(--testo);margin-top:1rem;opacity:0;animation:fu 1s ease 1.3s forwards}
.h-nap strong{color:var(--giallo);font-style:normal}
.h-cta{margin-top:3rem;opacity:0;animation:fu 1s ease 1.5s forwards}
.btn-go{background:var(--giallo);color:var(--nero);border:none;font-family:'DM Sans',sans-serif;font-weight:500;font-size:.8rem;letter-spacing:.25em;text-transform:uppercase;padding:1.1rem 3rem;cursor:pointer;transition:all .3s}
.btn-go:hover{background:var(--bianco);transform:translateY(-2px)}
.h-note{font-size:.7rem;color:var(--testo);margin-top:1rem;opacity:0;animation:fu 1s ease 1.7s forwards}
.fs{position:relative;z-index:1;padding:0 1.5rem 6rem;max-width:600px;margin:0 auto;display:none}
.fs.on{display:block}
.pw{position:sticky;top:0;background:var(--nero);padding:1rem 0 1.5rem;z-index:10;border-bottom:1px solid rgba(245,240,232,.05);margin-bottom:3rem}
.pl-row{display:flex;justify-content:space-between;align-items:center;margin-bottom:.6rem}
.pl-row span{font-size:.65rem;letter-spacing:.3em;text-transform:uppercase;color:var(--testo)}
.pl-row strong{color:var(--giallo);font-size:.75rem}
.pb{height:2px;background:rgba(245,240,232,.1)}
.pf{height:100%;background:var(--giallo);transition:width .5s ease;width:0%}
.q{margin-bottom:4rem;opacity:0;transform:translateY(20px);transition:all .6s ease}
.q.on{opacity:1;transform:translateY(0)}
.qn{font-family:'Bebas Neue',sans-serif;font-size:3.5rem;color:rgba(242,193,46,.15);line-height:1;margin-bottom:-.5rem}
.qt{font-family:'Cormorant Garamond',serif;font-size:clamp(1.3rem,5vw,1.7rem);line-height:1.4;color:var(--bianco);margin-bottom:.5rem}
.qp{font-family:'Cormorant Garamond',serif;font-style:italic;font-size:.9rem;color:var(--giallo);margin-bottom:1.5rem;display:block}
.mn{font-size:.68rem;color:var(--testo);letter-spacing:.15em;text-transform:uppercase;margin-bottom:1rem;font-style:italic}
.opts{display:flex;flex-direction:column;gap:.7rem}
.opts.g2{display:grid;grid-template-columns:1fr 1fr;gap:.7rem}
.opt{border:1px solid rgba(245,240,232,.12);padding:1rem 1.2rem;cursor:pointer;transition:all .2s;display:flex;align-items:center;gap:.8rem;position:relative;overflow:hidden}
.opt::before{content:'';position:absolute;left:0;top:0;bottom:0;width:0;background:rgba(242,193,46,.08);transition:width .3s}
.opt:hover::before{width:100%}
.opt:hover{border-color:rgba(242,193,46,.4)}
.opt.sel{border-color:var(--giallo);background:rgba(242,193,46,.06)}
.opt.sel::before{width:100%}
.oe{font-size:1.3rem;flex-shrink:0}
.ot{font-size:.88rem;color:var(--bianco);font-weight:300;line-height:1.3;position:relative;z-index:1}
.ot .sub{font-size:.72rem;color:var(--testo);display:block;margin-top:.1rem;font-style:italic}
.ock{margin-left:auto;width:1.2rem;height:1.2rem;border:1px solid rgba(245,240,232,.2);border-radius:50%;flex-shrink:0;transition:all .2s;position:relative;z-index:1}
.opt.sel .ock{background:var(--giallo);border-color:var(--giallo)}
.opt.sel .ock::after{content:'✓';position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-size:.65rem;color:var(--nero);font-weight:bold}
.tin{width:100%;background:rgba(245,240,232,.04);border:1px solid rgba(245,240,232,.12);color:var(--bianco);font-family:'DM Sans',sans-serif;font-size:.9rem;font-weight:300;padding:1rem 1.2rem;outline:none;transition:border-color .2s;resize:none;min-height:100px}
.tin:focus{border-color:var(--giallo)}
.tin::placeholder{color:rgba(245,240,232,.25);font-style:italic}
.rat{display:flex;gap:.5rem;flex-wrap:wrap}
.ri{flex:1;min-width:60px;border:1px solid rgba(245,240,232,.12);padding:.8rem .5rem;text-align:center;cursor:pointer;transition:all .2s}
.ri:hover,.ri.sel{border-color:var(--giallo);background:rgba(242,193,46,.06)}
.ri .rn{font-family:'Bebas Neue',sans-serif;font-size:1.5rem;color:var(--giallo);display:block}
.ri .rl{font-size:.6rem;color:var(--testo);letter-spacing:.1em}
.og{display:grid;grid-template-columns:1fr 1fr 1fr;gap:.6rem}
.oi{border:1px solid rgba(245,240,232,.12);padding:.8rem .5rem;text-align:center;cursor:pointer;transition:all .2s}
.oi:hover,.oi.sel{border-color:var(--giallo);background:rgba(242,193,46,.06)}
.oi .of{font-size:1.5rem;display:block;margin-bottom:.2rem}
.oi .on2{font-size:.65rem;color:var(--testo);letter-spacing:.1em}
.btn-sub{width:100%;background:var(--giallo);color:var(--nero);border:none;font-family:'DM Sans',sans-serif;font-weight:500;font-size:.85rem;letter-spacing:.25em;text-transform:uppercase;padding:1.2rem;cursor:pointer;transition:all .3s;margin-top:2rem}
.btn-sub:hover{background:var(--bianco);transform:translateY(-1px)}
.ty{display:none;min-height:100vh;flex-direction:column;justify-content:center;align-items:center;text-align:center;padding:2rem;position:relative;z-index:1}
.ty.on{display:flex}
.ty-ic{font-size:4rem;margin-bottom:2rem;animation:pop .5s ease}
.ty-ti{font-family:'Bebas Neue',sans-serif;font-size:clamp(3rem,12vw,5rem);color:var(--giallo);line-height:1;margin-bottom:.5rem}
.ty-su{font-family:'Cormorant Garamond',serif;font-style:italic;font-size:1.3rem;color:var(--bianco);margin-bottom:1rem}
.ty-bo{font-size:.85rem;color:var(--testo);font-weight:300;max-width:300px;line-height:1.6}
.ty-bo strong{color:var(--giallo);font-style:italic}
@keyframes fu{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}
@keyframes fl{0%,100%{transform:translateY(0)}50%{transform:translateY(-8px)}}
@keyframes pop{0%{transform:scale(.5);opacity:0}70%{transform:scale(1.1)}100%{transform:scale(1);opacity:1}}
</style>
</head>
<body>

let ans={}, lang='en';

// Detect lang from URL param
const urlP = new URLSearchParams(window.location.search);
if(urlP.get('lang') && TR[urlP.get('lang')]) lang = urlP.get('lang');

function L(l){
  lang=l;
  document.querySelectorAll('.lb').forEach(b=>b.classList.toggle('active',b.textContent===l.toUpperCase()));
  const t=TR[l];
  Object.keys(t).forEach(k=>{
    const el=document.getElementById('T_'+k);
    if(el){
      if(k==='q7ph') el.placeholder=t[k];
      else el.innerHTML=t[k];
    }
  });
  // Also update multi2
  const m2=document.getElementById('T_multi2');
  if(m2) m2.innerHTML=t.multi;
}

function go(){
  document.getElementById('hero').style.display='none';
  document.getElementById('fs').classList.add('on');
  setTimeout(()=>{document.querySelectorAll('.q').forEach((q,i)=>setTimeout(()=>q.classList.add('on'),i*150))},100);
  upd();
}

function cnt(){let c=0;for(let i=1;i<=7;i++){if(ans[i]&&(Array.isArray(ans[i])?ans[i].length>0:ans[i]))c++;}return c;}
function upd(){const c=cnt();document.getElementById('pf').style.width=(c/7*100)+'%';document.getElementById('pt').textContent=c+' / 7';}
function sel(el){const q=el.getAttribute('data-q');document.querySelectorAll('[data-q="'+q+'"]').forEach(o=>o.classList.remove('sel'));el.classList.add('sel');ans[q]=el.getAttribute('data-v');upd();}
function tog(el){el.classList.toggle('sel');const q=el.getAttribute('data-q');if(!ans[q])ans[q]=[];const v=el.getAttribute('data-v');if(el.classList.contains('sel')){if(!ans[q].includes(v))ans[q].push(v);}else{ans[q]=ans[q].filter(x=>x!==v);}upd();}
function selR(el){const q=el.getAttribute('data-q');document.querySelectorAll('[data-q="'+q+'"]').forEach(o=>o.classList.remove('sel'));el.classList.add('sel');ans[q]=el.getAttribute('data-v');upd();}
function selO(el){const q=el.getAttribute('data-q');document.querySelectorAll('[data-q="'+q+'"]').forEach(o=>o.classList.remove('sel'));el.classList.add('sel');ans[q]=el.getAttribute('data-v');upd();}
async function submit(){ans[7]=document.getElementById('ft').value;ans.lang=lang;ans.ts=new Date().toISOString();const payload={lingua:ans.lang,q1_perche_napoli:Array.isArray(ans[1])?ans[1].join(', '):ans[1]||'',q2_momento_migliore:ans[2]||'',q3_difficolta:Array.isArray(ans[3])?ans[3].join(', '):ans[3]||'',q4_souvenir:ans[4]||'',q5_budget:ans[5]||'',q6_nazionalita:ans[6]||'',q7_messaggio:ans[7]||'',timestamp:ans.ts};try{await fetch('https://formspree.io/f/meendwva',{method:'POST',headers:{'Content-Type':'application/json','Accept':'application/json'},body:JSON.stringify(payload)});}catch(e){console.log('err',e);}document.getElementById('fs').classList.remove('on');document.getElementById('ty').classList.add('on');}

// Init
L(lang);
</script>
